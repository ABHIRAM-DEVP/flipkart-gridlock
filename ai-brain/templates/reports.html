{% extends "base.html" %}
{% block title %}Reports{% endblock %}
{% block header %}Model Reports & Diagnostics{% endblock %}

{% block content %}
<div class="bg-slate-800 rounded-xl border border-slate-700 p-5 mb-6">
  <h2 class="font-semibold mb-4">Latest Model Performance</h2>
  <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-4" id="perf-cards"></div>
  <table class="w-full text-sm mt-4 border-collapse">
    <thead>
      <tr class="border-b border-slate-700 text-slate-400">
        <th class="text-left py-2">Class</th>
        <th class="text-left py-2">Precision</th>
        <th class="text-left py-2">Recall</th>
        <th class="text-left py-2">F1</th>
        <th class="text-left py-2">Support</th>
      </tr>
    </thead>
    <tbody id="clf-report-rows"></tbody>
  </table>
</div>

<div class="bg-slate-800 rounded-xl border border-slate-700 p-5 mb-6">
  <h2 class="font-semibold mb-4">Model History</h2>
  <canvas id="chart-history" height="120"></canvas>
</div>

<div class="bg-slate-800 rounded-xl border border-slate-700 p-5">
  <h2 class="font-semibold mb-4">Generated Graphs</h2>
  <div id="graphs-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
</div>

<div id="graph-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4">
  <div class="max-w-4xl w-full">
    <img id="modal-img" class="w-full rounded-xl" alt="graph" />
    <button type="button" id="modal-close" class="mt-3 text-slate-400 hover:text-white">Close</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/reports.js"></script>
{% endblock %}
