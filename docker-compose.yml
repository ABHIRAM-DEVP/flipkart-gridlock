services:
  astram-service:
    build:
      context: ./ai-brain
    container_name: astram-service
    ports:
      - "8000:8000"
    volumes:
      - ./ai-brain/artifacts:/app/artifacts
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=astram
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 15s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:15-alpine
    container_name: astram-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: astram
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d astram"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: astram-backend
    ports:
      - "8080:8080"
    volumes:
      - ./ai-brain/artifacts:/opt/astram-artifacts:ro
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:${POSTGRES_PORT}/astram
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - ASTRAM_SERVICE_URL=http://astram-service:8000
      - ASTRAM_FALLBACK_DIR=/opt/astram-artifacts
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      astram-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health | grep -q 'backend'"]
      interval: 15s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
    container_name: astram-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
